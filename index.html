<!DOCTYPE html>
<html>
<body>

<button onclick="prev()">←</button>
<span id="num">1 / 3</span>
<button onclick="next()">→</button>

<br>

<!-- iframeでPDF表示 -->
<iframe id="viewer" width="100%" height="500px" style="border:none;"></iframe>

<br>

<h1>BLOB形式</h1>
<iframe id="viewer1" width="100%" height="500px" style="border:none;"></iframe>

<script>
const pdfs = [
  './pdf1.pdf',
  './pdf2.pdf',
];
let current = 0;

function show(i) {
  const iframe = document.getElementById('viewer');
  const newIframe = document.createElement('iframe');
  newIframe.id = 'viewer'; // ← これを追加
  newIframe.width = '100%';
  newIframe.height = '500px';
  newIframe.style.border = 'none';
  newIframe.src = pdfs[i];
  iframe.replaceWith(newIframe);
  document.getElementById('num').textContent = (i + 1) + ' / ' + pdfs.length;
}

function prev() { current = (current - 1 + pdfs.length) % pdfs.length; show(current); }
function next() { current = (current + 1) % pdfs.length; show(current); }

show(0);

async function showPdf() {
  const response = await fetch('./multipage.pdf');
  const arrayBuffer = await response.arrayBuffer();

  const blob = new Blob([arrayBuffer], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);

  const old = document.getElementById('viewer1');  // viewer-wrapの行を削除
  const iframe = document.createElement('iframe');
  iframe.id = 'viewer1';
  iframe.style.cssText = 'width:100%; height:500px; border:none;';  // heightも合わせる
  iframe.onload = () => URL.revokeObjectURL(url);
  iframe.src = url;
  old.replaceWith(iframe);
}

showPdf();


</script>
</body>
</html>
